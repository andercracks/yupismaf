<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedTest</title>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6783067256794096"
     crossorigin="anonymous"></script>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="layout">

        <aside class="left-ad">
                    <!-- Futuro anuncio -->
        </aside>
            <main class="container">
        
                <h1>📈 SpeedTest</h1>
                <p class="subtitle">
                    Comprueba la velocidad de tu conexión a Internet 🎠
                </p>
        
                <section class="speed-card">
        
                    <div class="speed-circle">
                        <span id="speedValue">0</span>
                        <small>Mbps</small>
                    </div>
        
                    <button id="startButton">
                        Iniciar prueba
                    </button>
        
                    <div class="results">
        
                        <div class="result-box">
                            <h3>⬇ Descarga</h3>
                            <p id="download">-- Mbps</p>
                        </div>
        
                        <div class="result-box">
                            <h3>⬆ Subida</h3>
                            <p id="upload">-- Mbps</p>
                        </div>
        
                        <div class="result-box">
                            <h3>📶 Ping</h3>
                            <p id="ping">-- ms</p>
                        </div>
        
                    </div>
        
                    <p id="status">
                        Esperando para iniciar...
                    </p>
        
                </section>
        
            </main>

                <footer>

                    <p>© 2026 SpeedTest</p>
            
                    <a href="about.html">Acerca de</a> |
                    <a href="privacy.html">Privacidad</a> |
                    <a href="contact.html">Contacto</a>
            
                </footer>
        
            <script src="script.js"></script>
        
    </div>
</body>

    
</html>
